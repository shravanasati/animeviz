{%extends "base.html" %}


{%block title%} animeviz - Anime recommendations{%endblock%}

{% block head %}
{{super()}}
<script src="{{url_for('static', filename='scripts/recommendations.js')}}"></script>
<script
	src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit&onload=onloadTurnstileCallback"
	async defer></script>
{% endblock %}

{%block content%}

<dialog id="error-modal">
	<article>
		<header>
			<a href="" aria-label="Close" class="close"></a>
			<h3 id="modal-heading"></h3>
		</header>
		<p id="modal-content"></p>
	</article>
</dialog>

<div class="form-container center-container">
	<form id="recommendations-form">
		<fieldset>
			<label for="nsfw">
				<input type="checkbox" name="nsfw" id="nsfw" checked>
				Disable NSFW content
			</label>

			<br>

			{% if current_user and current_user.is_authenticated %}

			<label for="submit">
				<button aria-busy="false" id="submit">Get Recommendations</button>
			</label>

			{% else %}
			<label for="file">Upload animelist.xml
				<input type="file" name="file" id="file" accept=".xml">
			</label>

			<label for="submit">
				<button aria-busy="false" id="submit" disabled>Get Recommendations</button>
			</label>
			{% endif %}

			<label for="turnstile-captcha">
				<div id="cf-turnstile"></div>
			</label>
			<p id="time-reminder" style="display: none;">This might take several seconds.</p>
		</fieldset>
	</form>
</div>

<div id="results-container" class="center-container" style="display: none;">
	<h2>Your Recommendations</h2>
	<div id="recs-grid" class="recs-grid"></div>
</div>

{%endblock%}
